  # 3.4 Status and transaction registers (default slave 1)
  - name: "Availability"
    address: 1200
    register_type: holding
    data_type: u16
    endian: big

  - name: "Mode 3 State"
    address: 1201
    register_type: holding
    data_type: string
    length: 5
    endian: big

  - name: "Actual Applied Max Current"
    address: 1206
    register_type: holding
    data_type: f32
    unit: "A"
    endian: big

  - name: "Modbus Slave Max Current Remaining Valid Time"
    address: 1208
    register_type: holding
    data_type: u32
    unit: "s"
    endian: big

  - name: "Modbus Slave Max Current"
    address: 1210
    register_type: holding
    data_type: f32
    unit: "A"
