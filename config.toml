[alfen]
# IP address or hostname of your Alfen Eve charger
host = "192.168.0.50"
port = 502
unit_id = 1
socket_unit_id = 1 # single socket 
station_unit_id = 200
control_unit_id = 200
# Master takeover sequence: write SAFE_CURRENT -> VALIDITY -> MAX_CURRENT
takeover_sequence = true
takeover_safe_current_amps = 6.0
takeover_validity_secs = 120
takeover_validity_register = 1211
# How often to poll the charger (seconds)
poll_interval_secs = 5

[mqtt]
host = "pcthink.local"
port = 1883
client_id = "alfen-mqtt-bridge"
# Use a dedicated MQTT account for this bridge (not the HA integration user)
username = "alfen_bridge"
password = "your_alfen_bridge_password"
# Base topic prefix
topic_prefix = "alfen"
# Home Assistant MQTT discovery prefix
ha_discovery_prefix = "homeassistant"

[charger]
# Friendly name shown in Home Assistant
name = "Alfen Eve"
# Unique ID used in MQTT topics (no spaces)
unique_id = "alfen_eve_01"