[alfen]
# IP address or hostname of your Alfen Eve charger
host = "192.168.0.50"
port = 502
unit_id = 1
socket_unit_id = 1 # single socket 
station_unit_id = 200
control_unit_id = 1
# Master takeover sequence: optional SAFE_CURRENT and/or VALIDITY prewrites, then MAX_CURRENT
takeover_sequence = true
takeover_safe_current_amps = 6.0
# takeover_safe_current_register: optional register address to write safe current before MAX_CURRENT.
# Not present in the table-based 3.4 mapping; omit unless your firmware supports it.
# takeover_safe_current_register = ???
takeover_validity_secs = 120
# takeover_validity_register: optional register address to write validity seconds before MAX_CURRENT.
# Not present in the standard Alfen Modbus register map - omit unless your firmware supports it.
# takeover_validity_register = ???
# How often to poll the charger (seconds)
poll_interval_secs = 5

[mqtt]
host = "pcthink.local"
port = 1883
client_id = "alfen-mqtt-bridge"
# Use a dedicated MQTT account for this bridge (not the HA integration user)
username = "alfen_bridge"
password = "your_alfen_bridge_password"
# Base topic prefix
topic_prefix = "alfen"
# Home Assistant MQTT discovery prefix
ha_discovery_prefix = "homeassistant"

[charger]
# Friendly name shown in Home Assistant
name = "Alfen Eve"
# Unique ID used in MQTT topics (no spaces)
unique_id = "alfen_eve_01"

[solar_control]
# Live MQTT topic carrying returned solar power for the DSMR reader
power_topic = "src/esp_p1/sensor/dsmr_reader_power_returned/state"
# Auto-discovered HA switch command/state topics for solar charging mode
mode_command_topic = "alfen/alfen_eve_01/set/solar_mode"
mode_state_topic = "alfen/alfen_eve_01/state/solar_mode"
debug_state_topic = "alfen/alfen_eve_01/state/solar_debug"
power_threshold_kw = 5.0
switch_high_after_secs = 300
switch_low_after_secs = 300
solar_high_current_amps = 6.0
solar_low_current_amps = 4.0
fixed_current_amps = 6.0
mode_on_payload = "ON"
mode_off_payload = "OFF"
publish_only_on_change = true
publish_ha_discovery = true